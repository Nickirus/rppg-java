services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rppg}
      POSTGRES_USER: ${POSTGRES_USER:-rppg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rppg}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rppg} -d ${POSTGRES_DB:-rppg}"]
      interval: 5s
      timeout: 3s
      retries: 20

  janus:
    image: canyan/janus-gateway:latest
    command: ["/usr/local/bin/janus", "-F", "/usr/local/etc/janus"]
    restart: unless-stopped
    ports:
      - "8088:8088"
      - "8089:8089"
      - "8188:8188"
      - "10000-10100:10000-10100/udp"
    volumes:
      - ./janus/etc/janus.jcfg:/usr/local/etc/janus/janus.jcfg:ro
      - ./janus/etc/janus.plugin.videoroom.jcfg:/usr/local/etc/janus/janus.plugin.videoroom.jcfg:ro

  janus-publisher:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - janus
    ports:
      - "8081:80"
    volumes:
      - ./janus/publisher/index.html:/usr/share/nginx/html/index.html:ro
      - ./janus/publisher/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
